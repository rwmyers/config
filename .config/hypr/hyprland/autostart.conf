#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
exec-once = nm-applet &
# exec-once = hyprpaper & firefox
exec-once = wl-paste --watch cliphist store
exec=pkill waybar; waybar;

#####################
### IDLE AND LOCK ###
#####################
exec = pkill swayidle; $idle

##################
### BACKGROUND ###
##################
exec-once = swaybg -i ~/themes/current/background

####################
### MONITOR MODE ###
####################
# Pick the right monitor config for the current lid state on session start.
exec-once = hypr-monitor-mode --lid $(grep -q closed /proc/acpi/button/lid/LID*/state 2>/dev/null && echo 0 || echo 1)
