###########################################################
#### MONITOR SETUP AND WORKSPACE -> DISPLAY ASSIGNMENT ####
###########################################################
# https://wiki.hypr.land/Configuring/Monitors/ for more information

# Display variable assignment
$primaryMonitor = eDP-1
$secondaryMonitor = eDP-1
$teriaryMonitor = eDP-1

# Monitor positioning
# monitor = name, resolution, position, scale
# Example:
# monitor = DP-3, 3840x2160, 0x0, 1
monitor = $primaryMonitor, preferred, auto, 1.0

# Example triple monitor setup
# monitor = $secondaryMonitor, 3840x2160@120, 0x0, 1
# monitor = $primaryMonitor, 3840x2160@120, 3840x0, 1
# monitor = $tertiaryMonitor, 3840x2160@120, 7680x0, 1

# Workspace to monitor assignment
workspace = 1, monitor:$primaryMonitor

## default: true ensures the affinity but does not create the workspaces
workspace = 2, monitor:$primaryMonitor, default: true
workspace = 3, monitor:$primaryMonitor, default: true

## Secondary assignment
workspace = 4, monitor:$secondaryMonitor

## Tertiary assignment
workspace = 5, monitor:$tertiaryMonitor
workspace = 6, monitor:$tertiaryMonitor, default: true
